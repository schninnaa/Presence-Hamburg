<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Presence AR</title>
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<style>
/* Custom cursor */
body, button, .switch-btn, .description-button {
  cursor: url('needle.png') 16 16, auto;
}

body {
  margin: 0;          
  padding: 0;         
  background: #ffffff;
  display: flex;
  flex-direction: column;
  align-items: center;
  font-family: 'Roboto', sans-serif;
}

.viewer-container {
  width: 100%;
  max-width: 900px;
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 32px;
}

model-viewer {
  width: 100%;
  height: 50vw;
  max-height: 600px;
  min-height: 300px;
  background: none;
}

.switch-btns {
  margin: 24px 0;
  display: flex;
  gap: 12px;
  justify-content: center;
}

.switch-btn {
  background: none;
  border: none;
  padding: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: inherit;
}

.switch-btn .switch-img {
  width: auto;         
  height: 44px;        
  transition: transform 0.2s, filter 0.2s;
}

.switch-btn.active .switch-img {
  transform: scale(1.2);
  filter: none;
}

.switch-btn:not(.active) .switch-img {
  filter: grayscale(100%) contrast(1.1);
}

.hidden {
  display: none;
}

/* Description + button below YouTube */
.description-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: auto;
  max-width: none;
  margin-top: 32px;
}

.description-button {
  background: none;
  border: none;
  padding: 0;
  display: flex;
  justify-content: center;
  cursor: inherit;
  margin-bottom: 16px;
  margin-top: 60px;
  animation: balloonFloat 6s ease-in-out infinite;
}
