<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presence AR</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">

<style>

/* ----------------------- */
/* GLOBAL */
/* ----------------------- */
body{
  margin:0;
  padding:0;
  background:#ffffff;
  font-family:'Roboto',sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  position:relative;
  overflow-x:hidden;
}

/* ----------------------- */
/* PARTICLE BACKGROUND */
/* ----------------------- */
#particleCanvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1; /* Behind all content */
  pointer-events:none;
}

/* ----------------------- */
/* CUSTOM CURSOR */
body,button,.switch-btn,.description-button{
  cursor:url('needle.png') 16 16,auto;
}

/* ----------------------- */
/* VIEWERS */
.viewer-container{
  width:100%;
  max-width:900px;
  display:flex;
  flex-direction:column;
  align-items:center;
  margin-bottom:32px;
  position:relative;
  z-index:2;
}

model-viewer{
  width:100%;
  height:50vw;
  max-height:600px;
  min-height:300px;
  background:none;
}

/* ----------------------- */
/* SWITCH BUTTONS */
.switch-btns{
  margin:24px 0;
  display:flex;
  gap:12px;
  justify-content:center;
  z-index:2;
}

.switch-btn{
  background:none;
  border:none;
  padding:0;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:inherit;
}

.switch-img{
  height:44px;
  transition:transform .2s,filter .2s;
}

.switch-btn.active .switch-img{
  transform:scale(1.2);
  filter:none;
}

.switch-btn:not(.active) .switch-img{
  filter:grayscale(100%) contrast(1.1);
}

.hidden{
  display:none;
}

/* ----------------------- */
/* DESCRIPTION */
.description-wrapper{
  display:flex;
  flex-direction:column;
  align-items:center;
  margin-top:32px;
  z-index:2;
}

.description-button{
  background:none;
  border:none;
  margin-top:60px;
  animation:balloonFloat 6s ease-in-out infinite;
}

.description-button img{
  width:120px;
  transition:transform .2s;
}

.description-button img:hover{
  transform:scale(1.05);
}

@keyframes balloonFloat{
  0%{transform:translate(0,0) rotate(0);}
  20%{transform:translate(3px,-4px) rotate(-2deg);}
  40%{transform:translate(-2px,3px) rotate(1deg);}
  60%{transform:translate(2px,-3px);}
  80%{transform:translate(-3px,2px) rotate(2deg);}
  100%{transform:translate(0,0);}
}

.viewer-description{
  display:none;
  font-size:1.2rem;
  color:#222;
  padding:60px 30px;
  line-height:1.6;
  max-width:700px;
  text-align:left;
  position:relative;
}

.viewer-description::before{
  content:"";
  position:absolute;
  top:0;
  left:50%;
  width:200vw;
  height:100%;
  transform:translateX(-50%);
  background:url('ballon click2.png') center center no-repeat;
  background-size:auto 100%;
  z-index:-1;
}

/* ----------------------- */
/* VIDEO */
.video-wrapper{
  width:460px;
  height:740px;
  border-radius:8% / 5%;
  overflow:hidden;
  margin:32px auto;
  z-index:2;
}

.video-wrapper video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* ----------------------- */
/* FOLLOW */
.follow-btn-wrapper{
  display:flex;
  justify-content:center;
  margin:120px 0 0 0;
  z-index:2;
}

.follow-btn-wrapper img{
  width:360px;
  cursor:pointer;
}

.follow-btn-wrapper img:hover{
  transform:scale(1.05);
}

/* ----------------------- */
/* MOBILE */
@media (max-width:600px){
  .video-wrapper{
    width:80vw;
    height:calc(80vw*1.77);
  }
  .switch-img{
    height:36px;
  }
}

</style>
</head>

<body>

<canvas id="particleCanvas"></canvas>

<img src="title.png" style="max-width:640px;width:100%;margin:48px 0 35px 0;">

<div class="switch-btns">
  <button id="showViewer1" class="switch-btn active">
    <img src="ballon schild 1 fertig.png" class="switch-img">
  </button>
  <button id="showViewer2" class="switch-btn">
    <img src="ballon schild 2 fertig.png" class="switch-img">
  </button>
</div>

<div class="viewer-container" id="container1">
  <model-viewer
    src="semesterproject2.glb"
    ios-src="semesterproject2.usdz"
    ar
    ar-modes="scene-viewer quick-look webxr"
    camera-controls
    auto-rotate
    autoplay>
  </model-viewer>
</div>

<div class="viewer-container hidden" id="container2">
  <model-viewer
    src="semesterproject2.2test.glb"
    ios-src="semesterproject2.2test.usdz"
    ar
    ar-modes="scene-viewer quick-look webxr"
    camera-controls
    auto-rotate
    autoplay>
  </model-viewer>
</div>

<div class="video-wrapper">
  <video autoplay loop muted playsinline>
    <source src="copy_A128BA42-33FD-4D12-9A52-0FF0B9A483A0 (1).mp4" type="video/mp4">
  </video>
</div>

<div class="description-wrapper">
  <button class="description-button" id="descBtn" onclick="toggleDescription('desc','descBtn')">
    <img src="ballon click.png">
  </button>
  <div class="viewer-description" id="desc">
    This digital installation explores the transformation of a public space through human presence...
  </div>
</div>

<div class="follow-btn-wrapper">
  <a href="https://www.instagram.com/schninnaa/" target="_blank">
    <img src="follow me1.png">
  </a>
</div>

<audio id="clickSound" src="bottle-opening-wine-cork-pop-352701.mp3" preload="auto"></audio>

<script>

/* MODEL SWITCH */
const container1=document.getElementById('container1');
const container2=document.getElementById('container2');
const btn1=document.getElementById('showViewer1');
const btn2=document.getElementById('showViewer2');

btn1.onclick=()=>{
  container1.classList.remove('hidden');
  container2.classList.add('hidden');
  btn1.classList.add('active');
  btn2.classList.remove('active');
};

btn2.onclick=()=>{
  container2.classList.remove('hidden');
  container1.classList.add('hidden');
  btn2.classList.add('active');
  btn1.classList.remove('active');
};

/* DESCRIPTION */
function toggleDescription(descId,btnId){
  document.getElementById(descId).style.display='block';
  document.getElementById(btnId).style.display='none';
}

/* ----------------------- */
/* NATURAL CROWD-LIKE PARTICLES ----------------------- */

const canvas=document.getElementById("particleCanvas");
const ctx=canvas.getContext("2d");
let particles=[];
let mouse={x:0,y:0};

function resize(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
}
window.addEventListener("resize",resize);
resize();

const colors = [
  "rgba(255, 230, 180, 0.5)", // yellow
  "rgba(180, 255, 200,0.5)",  // green
  "rgba(200, 210, 255,0.5)",  // blue
  "rgba(255, 200, 220,0.5)"   // pink
];

class Particle{
  constructor(){
    this.x = Math.random()*canvas.width;
    this.y = Math.random()*canvas.height;
    this.size = Math.random()*3+1;
    this.baseSize = this.size;
    this.vx = (Math.random()-0.5)*0.03;
    this.vy = (Math.random()-0.5)*0.03;
    this.color = colors[Math.floor(Math.random()*colors.length)];
    this.changeTime = Math.random()*5000;
    this.pulseTime = Math.random()*3000;
  }

  move(){
    // slowly drift
    this.x += this.vx;
    this.y += this.vy;

    // wrap around
    if(this.x>canvas.width) this.x=0;
    if(this.x<0) this.x=canvas.width;
    if(this.y>canvas.height) this.y=0;
    if(this.y<0) this.y=canvas.height;

    // random direction change every few seconds
    this.changeTime += 16;
    if(this.changeTime > 3000 + Math.random()*3000){
      this.vx = (Math.random()-0.5)*0.03;
      this.vy = (Math.random()-0.5)*0.03;
      this.changeTime = 0;
    }

    // pulse size slightly
    this.pulseTime += 16;
    if(this.pulseTime > 2000 + Math.random()*2000){
      this.size = this.baseSize*(0.98 + Math.random()*0.04);
      this.pulseTime = 0;
    } else {
      this.size += (this.baseSize - this.size)*0.05;
    }

    // move with mouse only if close
    const dx = mouse.x - this.x;
    const dy = mouse.y - this.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if(dist<100){ // only closest particles follow mouse
      this.x += dx*0.005;
      this.y += dy*0.005;
    }
  }

  draw(){
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctx.fillStyle = this.color;
    ctx.fill();
  }
}

for(let i=0;i<220;i++){ // more particles
  particles.push(new Particle());
}

window.addEventListener("mousemove",e=>{
  mouse.x=e.clientX;
  mouse.y=e.clientY;
});

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    p.move();
    p.draw();
  });
  requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
